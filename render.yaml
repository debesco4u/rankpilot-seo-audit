services:
  - type: web
    name: rankpilot-seo-audit
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3001"
